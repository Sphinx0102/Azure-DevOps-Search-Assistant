name: only-desarrollo-to-master

on:
  pull_request:
    branches: [master]

jobs:
  validate-source:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source branch
        run: |
          echo "Head branch: ${{ github.head_ref }}"
          if [ "${{ github.head_ref }}" != "Desarrollo" ]; then
            echo "Only PRs from 'Desarrollo' to 'master' are allowed."
            exit 1
          fi
